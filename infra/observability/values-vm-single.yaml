# values-vm-single.yaml — VictoriaMetrics Single (k3d)
# Namespace: monitoring
# ---------------------------------------------------------------------------
# Alvo de memória: ~120-140Mi em operação
#
# Knobs de memória:
#   memory.allowedPercent: limita o cache de blocos TSDB em % da RAM do processo
#   Sem esse flag, o VM usa ~60-70% da RAM disponível → 150-200Mi facilmente
#
# Scrape interval 30s (em vez de 15s):
#   Reduz número de amostras/s → menos séries ativas → índice menor na RAM
#   Impacto no dashboard: mínimo (painéis de 1m rate ainda funcionam bem)
# ---------------------------------------------------------------------------

server:
  retentionPeriod: 1  # 1 dia — mínimo para evitar reindexação constante

  resources:
    requests:
      cpu: "30m"
      memory: "60Mi"    # Request baixo — scheduler não reserva mais que isso
    limits:
      cpu: "150m"
      memory: "100Mi"   # Hard limit: se passar disso, OOMKill (preferível a travar o node)

  extraArgs:
    envflag.enable: "true"
    envflag.prefix: VM_
    loggerFormat: json
    # CRÍTICO: limita o cache TSDB a 30% do limit de memória (~45Mi)
    # Sem isso, o VM aloca o máximo possível e bate em 200Mi+
    memory.allowedPercent: "30"
    inmemoryDataFlushInterval: "10s"

  scrape:
    enabled: true
    config:
      global:
        scrape_interval: 30s      # ← 30s em vez de 15s: -30% de séries ativas
        scrape_timeout: 10s
        #evaluation_interval: 30s

      scrape_configs:
        # -------------------------------------------------------
        # App — wizard-intelligence-network
        # Usa annotations prometheus.io/* nos pods
        # -------------------------------------------------------
        - job_name: kubernetes-pods-wizard
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: [wizard]
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: "([^:]+)(?::\\d+)?;(\\d+)"
              replacement: "$1:$2"
              target_label: __address__
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              target_label: app
            - target_label: job
              replacement: kubernetes-pods-wizard
          # Descarta métricas internas do Python/processo que não usamos
          # Reduz volume de séries armazenadas (~20% menos)
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: "python_gc_.*|python_info|process_virtual_memory_bytes|process_open_fds|process_start_time_seconds"
              action: drop

        # -------------------------------------------------------
        # Self-scrape do VictoriaMetrics
        # -------------------------------------------------------
        - job_name: victoria-metrics-self
          static_configs:
            - targets: ["localhost:8428"]
          metric_relabel_configs:
            # Manter apenas métricas essenciais do próprio VM
            - source_labels: [__name__]
              regex: "vm_rows_.*|vm_cache_.*|vm_app_uptime_seconds"
              action: keep

        # -------------------------------------------------------
        # cAdvisor — CPU e RAM por pod (panels de recursos)
        # Scrape via API do Kubernetes — requer ClusterRole
        # -------------------------------------------------------
        - job_name: kubernetes-cadvisor
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          metric_relabel_configs:
            # Manter apenas containers do namespace wizard + métricas essenciais
            # Isso evita guardar métricas de TODOS os containers do cluster
            - source_labels: [namespace]
              regex: wizard
              action: keep
            - source_labels: [__name__]
              regex: "container_cpu_usage_seconds_total|container_memory_working_set_bytes"
              action: keep

  serviceAccount:
    create: true

rbac:
  create: true
  pspEnabled: false
  clusterRole: true