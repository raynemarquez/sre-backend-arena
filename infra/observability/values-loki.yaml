loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki

  # Adiciona explicitamente o uso de memberlist para o KVStore.
  # Isso evita que ele tente conectar no Consul (porta 8500).
  storage_config:
    index_queries_cache_config:
      embedded_cache:
        enabled: true  # Resolve o aviso de "fifocache is deprecated"

  # Força o anel a ser interno
  ring:
    kvstore:
      store: inmemory

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100
    max_streams_per_user: 20000
    max_global_streams_per_user: 20000
    retention_period: 24h
    per_stream_rate_limit: "5MB"
    per_stream_rate_limit_burst: "20MB"

  ingester:
    chunk_idle_period: 5m
    max_chunk_age: 1h
    chunk_target_size: 1572864 # 1.5MB
    lifecycler:
      ring:
        kvstore:
          store: inmemory

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: "20m"
      memory: "40Mi" 
    limits:
      cpu: "100m"
      memory: "80Mi"
  persistence:
    enabled: false
  extraVolumes:
    - name: loki-storage
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-storage
      mountPath: /var/loki

# Desativa o Grafana Agent Operator que estava usando 82MiB
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

# Desativa explicitamente o Agent Operator se for via sub-chart
grafana-agent-operator:
  enabled: false

# Desativa o Canary para evitar logs de teste desnecessários
loki-canary:
  enabled: false

# Desativa testes de sanidade do Helm
test:
  enabled: false

# Desativa outros componentes de microserviços não usados no modo SingleBinary
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
gateway:
  enabled: false