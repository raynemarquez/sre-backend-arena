# values-promtail.yaml — Promtail (agente de coleta de logs)
# Chart: grafana/promtail versão 6.x  Release: promtail  Namespace: monitoring
# Fixado em 6.x — v7+ usa Alloy por padrão e quebra a config
#
# Usando modo nativo do chart v6 (config.clients + config.snippets).
# NAO usar config.file — o chart v6 mescla com defaults e gera conflito.

config:
  logLevel: info
  serverPort: 3101

  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
      batchwait: 5s
      batchsize: 1048576 # 1MB por envio

  positions:
    filename: /run/promtail/positions.yaml

  snippets:
    extraScrapeConfigs: |
      - job_name: wizard-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [wizard]
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                trace_id: trace_id
          - labels:
              level:
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1*/*/*.log
            source_labels: [__meta_kubernetes_pod_uid]
            target_label: __path__
          - replacement: wizard-intelligence-network
            target_label: service_name

defaultVolumes:
  - name: pods-logs
    hostPath:
      path: /var/log/pods

defaultVolumeMounts:
  - name: pods-logs
    mountPath: /var/log/pods
    readOnly: true

extraVolumes:
  - name: positions
    emptyDir: {}

extraVolumeMounts:
  - name: positions
    mountPath: /run/promtail

resources:
  requests:
    cpu: "50m"
    memory: "80Mi"
  limits:
    cpu: "100m"
    memory: "180Mi"

readinessProbe:
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10
  
tolerations:
  - effect: NoSchedule
    operator: Exists