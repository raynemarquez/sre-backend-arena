---
# 2. Dashboard provider — diz ao Grafana onde buscar os JSONs
apiVersion: v1
kind: ConfigMap
metadata:
  name: wizard-dashboard-provider-monitoring
  namespace: monitoring
data:
  provider.yaml: |-
    apiVersion: 1
    providers:
      - name: wizard-intelligence-network
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
# 4. Alertas — provisioning via arquivo (substitui sidecar grafana_alert)
apiVersion: v1
kind: ConfigMap
metadata:
  name: wizard-alert-provisioning-monitoring
  namespace: monitoring
data:
  alerting.yaml: |-
    apiVersion: 1
    contactPoints: []
    policies: []