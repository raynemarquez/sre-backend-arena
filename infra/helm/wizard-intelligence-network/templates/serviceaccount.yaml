apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wizard-intelligence-network.serviceAccountName" $ }}
  labels:
    {{- include "wizard-intelligence-network.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}