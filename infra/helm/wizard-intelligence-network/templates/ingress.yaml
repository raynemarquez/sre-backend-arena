{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wizard-intelligence-network.fullname" $ }}
  labels:
    {{- include "wizard-intelligence-network.labels" $ | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # No k3d com Traefik, ingressClassName: "traefik" é o valor correto.
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "wizard-intelligence-network.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
