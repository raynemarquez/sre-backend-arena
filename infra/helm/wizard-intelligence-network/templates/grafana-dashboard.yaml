{{- if .Values.grafanaDashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wizard-intelligence-network.fullname" . }}-dashboard
  namespace: monitoring
  labels:
    {{- include "wizard-intelligence-network.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  wizard-dashboard.json: |-
{{ .Files.Get "files/wizard-dashboard.json" | indent 4 }}
{{- end -}}