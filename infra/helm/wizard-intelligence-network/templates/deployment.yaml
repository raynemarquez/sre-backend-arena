apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wizard-intelligence-network.fullname" . }}
  labels:
    {{- include "wizard-intelligence-network.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wizard-intelligence-network.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "wizard-intelligence-network.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wizard-intelligence-network.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # /tmp como emptyDir é obrigatório com readOnlyRootFilesystem: true
      # Python e uvicorn usam /tmp para arquivos temporários de processo
      volumes:
        - name: tmp
          emptyDir: {}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          volumeMounts:
            - mountPath: /tmp
              name: tmp

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: APP_ENV
              value: {{ .Values.app.appEnv | default "production" | quote }}
            - name: APP_VERSION
              value: {{ .Values.app.appVersion | default .Chart.AppVersion | quote }}
            - name: HP_API_BASE_URL
              value: {{ .Values.app.hpApiBaseUrl | default "https://hp-api.onrender.com/api" | quote }}
            - name: HP_API_RATE_LIMIT_RPS
              value: {{ .Values.app.hpApiRateLimitRps | default "10" | quote }}
            - name: HP_API_RATE_LIMIT_BURST
              value: {{ .Values.app.hpApiRateLimitBurst | default "20" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel | default "info" | quote }}
            # OpenTelemetry — ativado apenas quando otel.enabled: true no values.yaml
            # Se ENABLE_TRACING não estiver definido, setup_tracing() não é chamado
            # e o SDK opera em modo no-op (zero overhead, zero dependências externas)
            {{- if .Values.otel.enabled }}
            - name: ENABLE_TRACING
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: {{ include "wizard-intelligence-network.fullname" . | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | default "http://tempo.monitoring.svc:4318" | quote }}
            {{- end }}

          # StartupProbe aponta para /ready (não /health) porque:
          # /ready verifica cache_ready=true — o pod não deve receber tráfego
          # antes do warmup terminar. Com failureThreshold=60 e period=10s,
          # o K8s aguarda até 10 minutos antes de reiniciar.
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5

          # LivenessProbe usa /health (leve, sem verificação de dependências)
          # Reinicia o pod apenas se o processo Python travar completamente
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # ReadinessProbe usa /ready (cache + circuit breaker)
          # K8s retira o pod do Service quando retorna 503, sem reiniciá-lo
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}