apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wizard-intelligence-network.fullname" . }}
  labels:
    {{- include "wizard-intelligence-network.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wizard-intelligence-network.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "wizard-intelligence-network.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wizard-intelligence-network.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # tmpfs obrigatório com readOnlyRootFilesystem: true
      # Python e uvicorn precisam de /tmp para arquivos temporários
      volumes:
        - name: tmp
          emptyDir: {}

      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          volumeMounts:
            - mountPath: /tmp
              name: tmp

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: APP_ENV
              value: {{ .Values.app.env | default "production" | quote }}
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            # OTEL Configuration
            - name: OTEL_SERVICE_NAME
              value: {{ include "wizard-intelligence-network.fullname" . | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | default "http://tempo.monitoring.svc:4318" | quote }}

          # Startup Probe: Aguarda o warmup do cache (pode demorar na primeira vez)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60

          # Liveness Probe: Verifica se o processo Python/Uvicorn está respondendo
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness Probe: Verifica se a app pode receber tráfego (Cache OK + CB Closed)
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}