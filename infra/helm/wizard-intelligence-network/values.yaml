# values.yaml — wizard-intelligence-network
# Ambiente local (k3d) — budget: 1.5 CPU / 350MB RAM total para TODA a stack
#
# Deploy:
#   helm upgrade --install wizard infra/helm/wizard-intelligence-network \
#     -n wizard --create-namespace \
#     -f infra/helm/wizard-intelligence-network/values.yaml

replicaCount: 1

image:
  repository: wizard-intelligence-network
  pullPolicy: Never
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "wizard-intelligence-network"

# Configuração da aplicação — escalares simples para uso direto no deployment.yaml

app:
                  
  appEnv: "production"
  appVersion: "1.0.0"
  hpApiBaseUrl: "https://hp-api.onrender.com/api"
  hpApiRateLimitRps: "10"
  hpApiRateLimitBurst: "20"
  logLevel: "info"

# OpenTelemetry — desabilitado por padrão para manter o budget local
# Para ativar: otel.enabled: true + otel.endpoint: "http://tempo.monitoring.svc:4318"
otel:
  enabled: false
  endpoint: ""
#  endpoint: "http://tempo.monitoring.svc:4318"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

# Configurações de Segurança (Best Practices SRE)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Service otimizado para ClusterIP (mais rápido dentro do cluster)
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

# Ingress via Traefik k3d — expõe na porta 8080 do host porta de entrada para os 10k RPS
ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Otimizações Traefik para alto tráfego
    # Formato obrigatório: {namespace}-{middlewareName}@kubernetescrd
    # Middleware "wizard-ratelimit" está no namespace "wizard" → "wizard-wizard-ratelimit"
    traefik.ingress.kubernetes.io/router.middlewares: "wizard-wizard-ratelimit@kubernetescrd"
  hosts:
    - host: wizard-arena.local
      paths:
        - path: /
          pathType: Prefix

# ─── Budget de Recursos ────────────────────────────────────────────────────
# Budget local: 1.5 CPU / 350MB RAM para TODA a stack (app + observabilidade)
#
# Distribuição (requests — o que o scheduler reserva):
#   App (2 réplicas HPA max): 2 × 100m CPU  / 2 × 64Mi RAM  = 200m / 128Mi
#   VictoriaMetrics:               30m CPU  /     60Mi RAM
#   Grafana:                       25m CPU  /     60Mi RAM
#   Loki:                          20m CPU  /     40Mi RAM
#   Promtail:                      20m CPU  /     30Mi RAM
#   ────────────────────────────────────────────────────────
#   TOTAL requests:               295m CPU  /    318Mi RAM  ✓ dentro de 350Mi
#
# ATENÇÃO: requests altos (ex: 200m/256Mi por réplica) reservam recursos no node
# e podem impedir o scheduling. A app em cache usa ~5-20m CPU e ~60-80Mi RAM.
# Limits altos são aceitáveis (usados apenas em pico); requests devem ser reais.

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m" # Permitir picos de CPU para processar os 10k RPS
    memory: "128Mi"


autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2  # Local: 2 réplicas = 200m CPU / 128Mi (dentro do budget)
                                                                                
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutos para evitar flapping

nodeSelector: {}
tolerations: []
affinity: {}

# Observabilidade como código — provisionamento via ConfigMaps no Grafana
grafanaDatasource:
  enabled: true

grafanaAlerts:
  enabled: true

grafanaDashboard:
  enabled: true

# Desativar ServiceMonitor (usaremos anotações para o VictoriaMetrics)
serviceMonitor:
  enabled: false

prometheusRules:
  enabled: false
