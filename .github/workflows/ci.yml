name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt
      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/
      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports

  lint-helm:
    name: Helm Lint & Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - name: Helm Lint
        # -f values.yaml garante que o lint valida os values do projeto,
        # não apenas os defaults do chart. Sem isso, erros como referências
        # a chaves inexistentes são silenciosamente ignorados.
        run: |
          helm lint infra/helm/wizard-intelligence-network/ \
            -f infra/helm/wizard-intelligence-network/values.yaml

      - name: Helm Template Validation
        # --set image.pullPolicy=IfNotPresent sobrescreve "Never" que só funciona
        # em cluster local com imagem importada — não disponível no CI.
        run: |
          helm template wizard-intelligence-network \
            infra/helm/wizard-intelligence-network/ \
            -f infra/helm/wizard-intelligence-network/values.yaml \
            --set image.pullPolicy=IfNotPresent \
            > /dev/null

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit (SAST)
                                                              
        run: bandit -r src/ -ll --skip B104

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint-helm, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: wizard-intelligence-network:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
